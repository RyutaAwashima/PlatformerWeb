<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlatformerWeb</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div id="game-wrap">
    <canvas id="canvas" width="960" height="540"></canvas>

    <!-- バーチャルパッド（タッチデバイスのみCSS表示） -->
    <div id="vpad" aria-hidden="true">
      <!-- D-パッドゾーン: 左50%幅。内部50%で◄►を分割。ドラッグで切替可 -->
      <div id="vpad-dpad" class="vpad-zone"></div>
      <!-- ジャンプゾーン: 右50%全体。DASHボタン範囲は game.tryDashTouch() で振り分け -->
      <div id="vpad-jump"  class="vpad-zone"></div>
    </div>
  </div>

  <!-- Matter.js を module より先に読み込みグローバルへ展開 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
