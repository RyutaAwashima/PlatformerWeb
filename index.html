<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlatformerWeb</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div id="game-wrap">
    <canvas id="canvas" width="960" height="540"></canvas>

    <!-- バーチャルパッド（タッチデバイスのみCSS表示） -->
    <div id="vpad" aria-hidden="true">
      <!-- 全画面ベースゾーン: タイトル・クリア画面の「どこでもタップ」用 -->
      <div id="vpad-catchall"  class="vpad-zone"></div>
      <!-- 左移動ゾーン: 左25% 下45% -->
      <div id="vpad-left-btn"  class="vpad-zone"></div>
      <!-- 右移動ゾーン: 左25〜50% 下45% -->
      <div id="vpad-right-btn" class="vpad-zone"></div>
      <!-- ジャンプゾーン: 右50% 全体 -->
      <div id="vpad-jump"      class="vpad-zone"></div>
    </div>
  </div>

  <!-- Matter.js を module より先に読み込みグローバルへ展開 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
